<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MAGICAL SHOOTER 魔法少女系戦闘Vtuber ももりの</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: 'Press Start 2P', 'Courier New', monospace;
}
#gameContainer {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,20,0.88);
  color: #fff;
  text-align: center;
  z-index: 10;
}
#overlay h1 {
  font-size: clamp(16px, 4vw, 36px);
  color: #ff88cc;
  text-shadow: 0 0 20px #ff44aa, 0 0 40px #ff00aa;
  margin-bottom: 20px;
  line-height: 1.4;
}
#overlay p {
  font-size: clamp(8px, 1.5vw, 14px);
  color: #aaccff;
  margin: 6px 0;
  line-height: 1.6;
}
#overlay .btn {
  margin-top: 24px;
  padding: 14px 32px;
  background: linear-gradient(135deg, #ff44aa, #aa00ff);
  color: #fff;
  border: 2px solid #ff88cc;
  font-size: clamp(10px, 2vw, 18px);
  font-family: inherit;
  cursor: pointer;
  border-radius: 4px;
  box-shadow: 0 0 20px #ff44aa88;
  transition: all 0.2s;
}
#overlay .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px #ff44aacc; }
#stageTitle {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: clamp(18px, 5vw, 48px);
  color: #ffff44;
  text-shadow: 0 0 30px #ffaa00;
  z-index: 9;
  pointer-events: none;
  display: none;
  text-align: center;
}
/* Mobile joystick */
#joystickArea {
  position: absolute; bottom: 20px; left: 20px;
  width: 120px; height: 120px;
  display: none;
  z-index: 20;
}
#joystickBase {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.3);
  position: relative;
}
#joystickKnob {
  width: 50px; height: 50px;
  border-radius: 50%;
  background: rgba(255,136,204,0.6);
  border: 2px solid rgba(255,136,204,0.9);
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 10px rgba(255,136,204,0.5);
}
#mobileButtons {
  position: absolute; bottom: 20px; right: 20px;
  width: 110px; height: 110px;
  display: none;
  z-index: 20;
}
.mobileBtn {
  position: absolute;
  color: #fff;
  font-family: inherit;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1;
  border-radius: 50%;
  font-weight: 900;
  letter-spacing: 0.05em;
  text-shadow: 0 1px 1px rgba(0,0,0,0.8), 0 0 3px rgba(0,0,0,0.6);
  transition: transform 0.05s ease-out, box-shadow 0.05s ease-out;
  border: none;
}
.mobileBtn::before {
  /* subtle top reflection on the plastic cap */
  content: '';
  position: absolute;
  top: 8%; left: 22%;
  width: 56%; height: 20%;
  border-radius: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0));
  pointer-events: none;
}
.mobileBtn .key {
  font-size: 6px;
  font-weight: 700;
  letter-spacing: 0;
  opacity: 0.85;
  margin-bottom: 1px;
}
.mobileBtn .label {
  font-size: 8px;
  letter-spacing: 0.04em;
}
.mobileBtn .ammo {
  display: inline-block;
  margin-top: 1px;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0;
  text-shadow: 0 1px 2px rgba(0,0,0,0.85);
}
.mobileBtn .ammo.empty {
  color: #ff6688;
  opacity: 0.7;
}
.mobileBtn:active {
  transform: translateY(2px);
}
/* SHOT — red arcade button */
#btnShoot {
  right: 0; bottom: 0;
  width: 58px; height: 58px;
  background: linear-gradient(180deg, #ff6464 0%, #e22020 55%, #a50808 100%);
  box-shadow:
    0 0 0 3px #161616,
    0 0 0 4px #3a3a3a,
    0 5px 0 #1a1a1a,
    0 7px 10px rgba(0,0,0,0.55),
    inset 0 -3px 5px rgba(60,0,0,0.5),
    inset 0 2px 3px rgba(255,200,200,0.35);
}
#btnShoot:active {
  box-shadow:
    0 0 0 3px #161616,
    0 0 0 4px #3a3a3a,
    0 1px 0 #1a1a1a,
    0 3px 6px rgba(0,0,0,0.55),
    inset 0 -2px 3px rgba(60,0,0,0.55),
    inset 0 1px 2px rgba(255,200,200,0.3);
}
#btnShoot .label {
  font-size: 11px;
  margin-top: 1px;
}
/* BEAM — blue arcade button */
#btnBeam {
  right: 64px; bottom: 58px;
  width: 36px; height: 36px;
  background: linear-gradient(180deg, #6cc4ff 0%, #2474e0 55%, #0a3590 100%);
  box-shadow:
    0 0 0 2px #161616,
    0 0 0 3px #3a3a3a,
    0 4px 0 #1a1a1a,
    0 6px 9px rgba(0,0,0,0.55),
    inset 0 -3px 5px rgba(0,20,80,0.5),
    inset 0 2px 3px rgba(220,240,255,0.4);
}
#btnBeam:active {
  box-shadow:
    0 0 0 2px #161616,
    0 0 0 3px #3a3a3a,
    0 1px 0 #1a1a1a,
    0 3px 5px rgba(0,0,0,0.55),
    inset 0 -2px 3px rgba(0,20,80,0.55),
    inset 0 1px 2px rgba(220,240,255,0.3);
}
/* BOMB — yellow arcade button */
#btnBomb {
  right: 64px; bottom: 14px;
  width: 36px; height: 36px;
  background: linear-gradient(180deg, #ffdd66 0%, #f0a014 55%, #8a4f00 100%);
  box-shadow:
    0 0 0 2px #161616,
    0 0 0 3px #3a3a3a,
    0 4px 0 #1a1a1a,
    0 6px 9px rgba(0,0,0,0.55),
    inset 0 -3px 5px rgba(80,40,0,0.5),
    inset 0 2px 3px rgba(255,240,200,0.4);
}
#btnBomb:active {
  box-shadow:
    0 0 0 2px #161616,
    0 0 0 3px #3a3a3a,
    0 1px 0 #1a1a1a,
    0 3px 5px rgba(0,0,0,0.55),
    inset 0 -2px 3px rgba(80,40,0,0.55),
    inset 0 1px 2px rgba(255,240,200,0.3);
}
/* PAUSE — neutral arcade button beside joystick */
#pauseBtn {
  position: absolute;
  bottom: 65px; left: 160px;
  width: 50px; height: 50px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 20;
  font-family: inherit;
  font-weight: 900;
  font-size: 16px;
  letter-spacing: 1px;
  color: #fff;
  background: linear-gradient(180deg, #b0b0b0 0%, #5a5a5a 55%, #2a2a2a 100%);
  text-shadow: 0 1px 2px rgba(0,0,0,0.75);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: transform 0.05s ease-out, box-shadow 0.05s ease-out;
  box-shadow:
    0 0 0 3px #161616,
    0 0 0 4px #3a3a3a,
    0 4px 0 #1a1a1a,
    0 7px 10px rgba(0,0,0,0.55),
    inset 0 -3px 5px rgba(0,0,0,0.4),
    inset 0 2px 3px rgba(255,255,255,0.3);
}
#pauseBtn::before {
  content: '';
  position: absolute;
  top: 8%; left: 22%;
  width: 56%; height: 20%;
  border-radius: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0));
  pointer-events: none;
}
#pauseBtn:active {
  transform: translateY(2px);
  box-shadow:
    0 0 0 3px #161616,
    0 0 0 4px #3a3a3a,
    0 1px 0 #1a1a1a,
    0 3px 6px rgba(0,0,0,0.55),
    inset 0 -2px 3px rgba(0,0,0,0.45),
    inset 0 1px 2px rgba(255,255,255,0.2);
}
#pauseBtn.paused {
  background: linear-gradient(180deg, #ffe066 0%, #f5a814 55%, #c46500 100%);
  font-size: 18px;
  letter-spacing: 0;
}
/* BGM mute toggle — small floating button at top-right */
#bgmBtn {
  position: absolute;
  top: 12px; right: 12px;
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 25;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  background: rgba(40, 40, 60, 0.6);
  border: 1px solid rgba(255,255,255,0.35);
  text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: opacity 0.1s, transform 0.1s, background 0.1s;
}
#bgmBtn:hover { background: rgba(60, 60, 90, 0.7); }
#bgmBtn:active { transform: scale(0.95); }
#bgmBtn.muted {
  opacity: 0.55;
  background: rgba(80, 30, 30, 0.6);
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="stageTitle"></div>
  <div id="joystickArea">
    <div id="joystickBase"><div id="joystickKnob"></div></div>
  </div>
  <div id="pauseBtn" title="一時停止 (P/Esc)">❚❚</div>
  <div id="bgmBtn" title="BGM ON/OFF (M)">♪</div>
  <div id="mobileButtons">
    <div class="mobileBtn" id="btnBeam">
      <span class="key">[C]</span>
      <span class="label">BEAM</span>
      <span class="ammo" id="beamCount">2</span>
    </div>
    <div class="mobileBtn" id="btnBomb">
      <span class="key">[X]</span>
      <span class="label">BOMB</span>
      <span class="ammo" id="bombCount">3</span>
    </div>
    <div class="mobileBtn" id="btnShoot">
      <span class="key">[Z/SP]</span>
      <span class="label">SHOT</span>
    </div>
  </div>
  <div id="overlay">
    <h1>✨ MAGICAL SHOOTER ✨<br>魔法少女系戦闘Vtuber ももりの</h1>
    <p>地球に迫る宇宙怪獣の大軍！</p>
    <p>魔法少女系戦闘Vtuber ももりのが人類の命運を賭けて戦う！</p>
    <button class="btn" id="startBtn">▶ GAME START</button>
  </div>
</div>

// Gamepad input state (combined with keyboard/touch in updatePlayer)
let gpInput = { dx: 0, dy: 0, shoot: false, connected: false };

window.addEventListener('gamepadconnected', e => { gpInput.connected = true; });
window.addEventListener('gamepaddisconnected', e => {
  gpInput = { dx: 0, dy: 0, shoot: false, connected: false };
  gpButtonsPrev = [];
});

function pollGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  let pad = null;
  for (const p of pads) { if (p && p.connected) { pad = p; break; } }
  if (!pad) {
    gpInput.dx = 0; gpInput.dy = 0; gpInput.shoot = false; gpInput.connected = false;
    return;
  }
  gpInput.connected = true;

  // Movement: left stick + D-pad
  const dz = 0.18;
  let gx = pad.axes[0] || 0;
  let gy = pad.axes[1] || 0;
  if (Math.abs(gx) < dz) gx = 0;
  if (Math.abs(gy) < dz) gy = 0;
  if (pad.buttons[14] && pad.buttons[14].pressed) gx = -1;
  if (pad.buttons[15] && pad.buttons[15].pressed) gx = 1;
  if (pad.buttons[12] && pad.buttons[12].pressed) gy = -1;
  if (pad.buttons[13] && pad.buttons[13].pressed) gy = 1;
  gpInput.dx = gx;
  gpInput.dy = gy;

  // Buttons (standard mapping): 0=A 1=B 2=X 3=Y 7=RT 9=Start
  const bs = pad.buttons.map(b => !!(b && b.pressed));
  // Hold-to-shoot on A or RT
  gpInput.shoot = bs[0] || bs[7];
  // Edge-trigger one-shots
  if (bs[1] && !gpButtonsPrev[1]) fireBeam();        // B → BEAM
  if (bs[2] && !gpButtonsPrev[2]) dropBomb();        // X → BOMB
  if (bs[3] && !gpButtonsPrev[3]) toggleBGMMute();   // Y → BGM mute
  if (bs[9] && !gpButtonsPrev[9]) togglePause();     // Start → PAUSE
  gpButtonsPrev = bs;
}

// ==================== TERRAIN ====================
// Returns {top, bot} pixel positions for the playable opening at world X.
// During boss fights the cave widens to give the boss room.
function getTerrainAt(x, stageIdx) {
  if (!STAGE_CONFIG[stageIdx] || bossSpawned) return { top: 0, bot: CANVAS_H };
  const t = STAGE_CONFIG[stageIdx].terrain;
  if (!t || t === 'open') return { top: 0, bot: CANVAS_H };
  const s = (x + frameCount * 1.5) * 0.005;
  let top = 0, bot = CANVAS_H;
  if (t === 'cave_narrow') {
    top = 30 + Math.sin(s) * 30 + Math.sin(s * 2.3) * 18;
    bot = CANVAS_H - 30 - Math.sin(s + 1.5) * 30 - Math.sin(s * 2.3 + 0.5) * 18;
  } else if (t === 'cave_pulse') {
    const pulse = Math.sin(frameCount * 0.04) * 35;
    top = 50 + Math.sin(s * 0.8) * 25 + pulse;
    bot = CANVAS_H - 50 - Math.sin(s * 0.8 + 1) * 25 - pulse;
  } else if (t === 'cave_fortress') {
    top = 60 + Math.sin(s * 1.4) * 40 + Math.sin(s * 0.5) * 22;
    bot = CANVAS_H - 60 - Math.sin(s * 1.4 + 0.7) * 40 - Math.sin(s * 0.5 + 0.3) * 22;
  }
  // Safety: never close tighter than player can fit
  const minOpening = PLAYER_H + 24;
  if (bot - top < minOpening) {
    const mid = (top + bot) / 2;
    top = mid - minOpening / 2;
    bot = mid + minOpening / 2;
  }
  return { top, bot };
}

function drawTerrain(stageIdx) {
  if (!STAGE_CONFIG[stageIdx]) return;
  const t = STAGE_CONFIG[stageIdx].terrain;
  if (!t || t === 'open') return;
  if (bossSpawned) return;
  const colors = {
    cave_narrow:   { fill: '#1a1530', edge: '#aa66ff' },
    cave_pulse:    { fill: '#10282a', edge: '#44ffdd' },
    cave_fortress: { fill: '#2a1015', edge: '#ff4488' },
  };
  const c = colors[t] || { fill: '#1a1530', edge: '#aaaaff' };
  const samples = [];
  const step = 8;
  for (let x = 0; x <= CANVAS_W + step; x += step) {
    samples.push({ x, ...getTerrainAt(x, stageIdx) });
  }
  // Top wall
  ctx.fillStyle = c.fill;
  ctx.beginPath();
  ctx.moveTo(0, -10);
  for (let s of samples) ctx.lineTo(s.x, s.top);
  ctx.lineTo(CANVAS_W + 10, -10);
  ctx.closePath();
  ctx.fill();
  // Bottom wall
  ctx.beginPath();
  ctx.moveTo(0, CANVAS_H + 10);
  for (let s of samples) ctx.lineTo(s.x, s.bot);
  ctx.lineTo(CANVAS_W + 10, CANVAS_H + 10);
  ctx.closePath();
  ctx.fill();
  // Glowy edges
  ctx.save();
  ctx.shadowBlur = 14;
  ctx.shadowColor = c.edge;
  ctx.strokeStyle = c.edge;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < samples.length; i++) {
    if (i === 0) ctx.moveTo(samples[i].x, samples[i].top);
    else ctx.lineTo(samples[i].x, samples[i].top);
  }
  ctx.stroke();
  ctx.beginPath();
  for (let i = 0; i < samples.length; i++) {
    if (i === 0) ctx.moveTo(samples[i].x, samples[i].bot);
    else ctx.lineTo(samples[i].x, samples[i].bot);
  }
  ctx.stroke();
  ctx.restore();
}

// Mobile joystick

let joystickOrigin = { x: 0, y: 0 };

function togglePause() {

  isPaused = !isPaused;
  const btn = document.getElementById('pauseBtn');

function setupMobile() {
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 900;
  isMobileDevice = isMobile;
  if (isMobile) {
    document.getElementById('joystickArea').style.display = 'block';
    document.getElementById('mobileButtons').style.display = 'flex';
    document.getElementById('pauseBtn').style.display = 'flex';
  }
  // Pause button works on both touch and click
  const pauseBtn = document.getElementById('pauseBtn');
  pauseBtn.addEventListener('click', togglePause);
  pauseBtn.addEventListener('touchstart', e => {
    e.preventDefault();
    togglePause();
  }, { passive: false });

  // BGM mute button (visible on PC + mobile)
  const bgmBtn = document.getElementById('bgmBtn');
  bgmBtn.addEventListener('click', toggleBGMMute);
  bgmBtn.addEventListener('touchstart', e => {
    e.preventDefault();
    toggleBGMMute();
  }, { passive: false });
  
  const jBase = document.getElementById('joystickBase');
  const jKnob = document.getElementById('joystickKnob');
  
  jBase.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    joystickTouchId = t.identifier;
    const rect = jBase.getBoundingClientRect();
    joystickOrigin = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
    joystick.active = true;
  }, { passive: false });
  
  document.addEventListener('touchmove', e => {
    for (let t of e.changedTouches) {
      if (t.identifier === joystickTouchId) {
        e.preventDefault();
        const dx = t.clientX - joystickOrigin.x;
        const dy = t.clientY - joystickOrigin.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const maxR = 40;
        const ratio = dist > maxR ? maxR/dist : 1;
        joystick.dx = dx * ratio / maxR;
        joystick.dy = dy * ratio / maxR;
        jKnob.style.transform = `translate(calc(-50% + ${dx*ratio}px), calc(-50% + ${dy*ratio}px))`;
      }
    }
  }, { passive: false });
  
  document.addEventListener('touchend', e => {
    for (let t of e.changedTouches) {
      if (t.identifier === joystickTouchId) {
        joystick = { dx: 0, dy: 0, active: false };
        joystickTouchId = null;
        jKnob.style.transform = 'translate(-50%,-50%)';
      }
    }
  });
  
  // Mobile buttons
  const btnShoot = document.getElementById('btnShoot');
  btnShoot.addEventListener('touchstart', e => { e.preventDefault(); mobileShootHeld = true; });
  btnShoot.addEventListener('touchend', e => { e.preventDefault(); mobileShootHeld = false; });
  document.getElementById('btnBomb').addEventListener('touchstart', e => { e.preventDefault(); dropBomb(); });
  document.getElementById('btnBeam').addEventListener('touchstart', e => { e.preventDefault(); fireBeam(); });
}

// 16-tier upgrade ladder (LV0..LV15) — Gradius-inspired progression.
// Each tier ADDS to previous tiers, so higher levels are strictly more bullets.
function fireShot() {
  const now = Date.now();
  if (now - lastShot < 100) return;
  lastShot = now;

  const bx = player.x + player.w/2;
  const by = player.y + player.h/2;
  const lv = player.upgradeLevel;
  const dmg = 1 + Math.floor(lv / 3); // 1, 1, 1, 2, 2, 2, 3, ... up to 6 at LV15
  const color = `hsl(${320 - lv * 6}, 100%, 75%)`;

  // LV0: single forward
  bullets.push({ x: bx, y: by, vx: 12, vy: 0, w: 14, h: 5, dmg, color });

  // LV1: tighter parallel double
  if (lv >= 1) {
    bullets.push({ x: bx, y: by - 5, vx: 12, vy: 0, w: 12, h: 4, dmg, color });
    bullets.push({ x: bx, y: by + 5, vx: 12, vy: 0, w: 12, h: 4, dmg, color });
  }
  // LV2: 3-way (slight angle)
  if (lv >= 2) {
    bullets.push({ x: bx, y: by, vx: 11, vy: -3, w: 12, h: 4, dmg, color });
    bullets.push({ x: bx, y: by, vx: 11, vy:  3, w: 12, h: 4, dmg, color });
  }
  // LV3: rear shot
  if (lv >= 3) {
    bullets.push({ x: bx, y: by, vx: -10, vy: 0, w: 12, h: 4, dmg, color });
  }
  // LV4: 5-way fan
  if (lv >= 4) {
    bullets.push({ x: bx, y: by, vx: 10, vy: -6, w: 10, h: 4, dmg, color });
    bullets.push({ x: bx, y: by, vx: 10, vy:  6, w: 10, h: 4, dmg, color });
  }
  // LV5: side missiles (orange, +1 dmg)
  if (lv >= 5) {
    bullets.push({ x: bx, y: by - 22, vx: 8, vy: -1.5, w: 10, h: 6, dmg: dmg + 1, color: '#ffaa00' });
    bullets.push({ x: bx, y: by + 22, vx: 8, vy:  1.5, w: 10, h: 6, dmg: dmg + 1, color: '#ffaa00' });
  }
  // LV6: piercing laser (white, fast, pierces)
  if (lv >= 6) {
    bullets.push({ x: bx, y: by, vx: 18, vy: 0, w: 28, h: 3, dmg: dmg + 1, color: '#ffffff', pierce: true });
  }
  // LV7: 7-way wider fan
  if (lv >= 7) {
    bullets.push({ x: bx, y: by, vx: 9, vy: -8, w: 10, h: 4, dmg, color });
    bullets.push({ x: bx, y: by, vx: 9, vy:  8, w: 10, h: 4, dmg, color });
  }
  // LV8: rear spread (3-way back)
  if (lv >= 8) {
    bullets.push({ x: bx, y: by, vx: -9, vy: -4, w: 10, h: 4, dmg, color });
    bullets.push({ x: bx, y: by, vx: -9, vy:  4, w: 10, h: 4, dmg, color });
  }
  // LV9: vertical shots (perpendicular)
  if (lv >= 9) {
    bullets.push({ x: bx, y: by, vx: 0, vy: -11, w: 4, h: 12, dmg, color });
    bullets.push({ x: bx, y: by, vx: 0, vy:  11, w: 4, h: 12, dmg, color });
  }
  // LV10: 9-way ultra wide
  if (lv >= 10) {
    bullets.push({ x: bx, y: by, vx: 7, vy: -10, w: 10, h: 4, dmg, color });
    bullets.push({ x: bx, y: by, vx: 7, vy:  10, w: 10, h: 4, dmg, color });
  }
  // LV11: heavy missiles (high damage, red)
  if (lv >= 11) {
    bullets.push({ x: bx, y: by - 18, vx: 9, vy: -1, w: 16, h: 8, dmg: dmg + 2, color: '#ff4400' });
    bullets.push({ x: bx, y: by + 18, vx: 9, vy:  1, w: 16, h: 8, dmg: dmg + 2, color: '#ff4400' });
  }
  // LV12: dual side lasers (yellow, pierce)
  if (lv >= 12) {
    bullets.push({ x: bx, y: by - 12, vx: 16, vy: 0, w: 24, h: 3, dmg: dmg + 1, color: '#ffff88', pierce: true });
    bullets.push({ x: bx, y: by + 12, vx: 16, vy: 0, w: 24, h: 3, dmg: dmg + 1, color: '#ffff88', pierce: true });
  }
  // LV13: rear-diagonal coverage
  if (lv >= 13) {
    bullets.push({ x: bx, y: by, vx: -8, vy: -7, w: 10, h: 4, dmg, color });
    bullets.push({ x: bx, y: by, vx: -8, vy:  7, w: 10, h: 4, dmg, color });
  }
  // LV14: starburst diagonals
  if (lv >= 14) {
    for (let a of [-Math.PI*0.35, -Math.PI*0.22, Math.PI*0.22, Math.PI*0.35]) {
      bullets.push({ x: bx, y: by, vx: Math.cos(a)*11, vy: Math.sin(a)*11, w: 8, h: 4, dmg, color });
    }
  }
  // LV15: spinning energy ring (rotates every shot)
  if (lv >= 15) {
    const t = frameCount * 0.4;
    for (let i = 0; i < 4; i++) {
      const a = t + (i / 4) * Math.PI * 2;
      bullets.push({ x: bx, y: by, vx: Math.cos(a)*8 + 4, vy: Math.sin(a)*8, w: 10, h: 10, dmg: dmg + 1, color: '#ff88ff' });
    }
  }

  playSound('shoot');

  // Guardian shots — scale damage with player upgrade
  for (let g of guardians) {
    const gx = player.x + player.w/2 + Math.cos(g.angle) * g.radius;
    const gy = player.y + player.h/2 + Math.sin(g.angle) * g.radius;
    if (beamActive) {
      bullets.push({ x: gx, y: gy, vx: 14, vy: 0, w: 30, h: 10, dmg: 30 + lv * 2, color: '#88ffff', beam: true });
    } else {
      bullets.push({ x: gx, y: gy, vx: 12, vy: 0, w: 10, h: 4, dmg, color: '#aaffff' });
    }
  }
}

// Bomb projectiles array
let bombs = [];

function dropBomb() {
  if (stageBombs <= 0 || gameState !== 'playing') return;
  stageBombs--;
  // Launch bomb projectile forward
  bombs.push({
    x: player.x + player.w,
    y: player.y + player.h/2,
    vx: 8,
    vy: 0,
    life: 80, // frames before forced explode
    exploded: false,
    r: 14
  });
  // Sound: bomb launch
  playSound('bomb_launch');
}

function explodeBomb(bx, by) {
  const bombR = 400; // visible radius
  const bombDmg = 10 + player.upgradeLevel * 2; // LV0:10 .. LV15:40
  // Firework particles - many colors, large radius
  const COUNT = 80;
  for (let i = 0; i < COUNT; i++) {
    const a = (i / COUNT) * Math.PI * 2;
    const spd = 4 + Math.random() * 10;
    particles.push({
      x: bx, y: by,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 50 + Math.random() * 40, maxLife: 90,
      color: `hsl(${Math.random()*360}, 100%, ${60+Math.random()*30}%)`,
      size: 5 + Math.random() * 8
    });
  }
  // Secondary sparkles
  for (let i = 0; i < 40; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 6;
    particles.push({
      x: bx + (Math.random()-0.5)*80,
      y: by + (Math.random()-0.5)*80,
      vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      life: 30+Math.random()*30, maxLife: 60,
      color: `hsl(${Math.random()*60+20}, 100%, 80%)`,
      size: 3 + Math.random() * 5
    });
  }
  // Damage enemies in radius
  for (let e of enemies) {
    const ex = e.x + e.w/2, ey = e.y + e.h/2;
    const d = Math.sqrt((ex-bx)**2 + (ey-by)**2);
    if (d < bombR) {
      e.hp -= bombDmg;
      addHitEffect(ex, ey, '#ffaa00');
    }
  }
  if (boss) {
    const bxc = boss.x + boss.w/2, byc = boss.y + boss.h/2;
    const d = Math.sqrt((bxc-bx)**2 + (byc-by)**2);
    if (d < bombR + boss.w/2) boss.hp -= bombDmg;
  }
  playSound('bomb_explode');
}

function updateBombs() {
  for (let i = bombs.length-1; i >= 0; i--) {
    const b = bombs[i];
    if (b.exploded) { bombs.splice(i,1); continue; }
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    // Hit screen edge or timeout
    if (b.x > CANVAS_W - 10 || b.life <= 0) {
      explodeBomb(b.x, b.y);
      b.exploded = true;
      bombs.splice(i,1);
    }
  }
}

function drawBombs() {
  for (let b of bombs) {
    // Draw bomb as glowing circle
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ffaa00';
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffdd00';
    ctx.beginPath();
    ctx.arc(b.x - 4, b.y - 4, b.r*0.4, 0, Math.PI*2);
    ctx.fill();
    // Flame trail
    ctx.fillStyle = '#ff4400aa';
    ctx.beginPath();
    ctx.arc(b.x - 20, b.y, b.r*0.6, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function fireBeam() {
  if (stageBeam <= 0 || beamActive || gameState !== 'playing') return;
  stageBeam--;
  beamActive = true;
  beamTimer = 240; // 4 sec at 60fps
  player.beamMode = true;
  playSound('beam_start');
}

function createEnemy(type, x, y, stageIdx) {
  const sm = STAGE_CONFIG[stageIdx];
  const baseTypes = {
    'blob':      { w: 44, h: 36, hp:  5, speed: 2.2, color: '#55ff88', points: 100, shape: 'blob' },
    'eye':       { w: 36, h: 36, hp:  8, speed: 1.8, color: '#ff55aa', points: 150, shape: 'eye' },
    'dart':      { w: 48, h: 24, hp:  3, speed: 4.0, color: '#ffaa22', points: 120, shape: 'dart' },
    'tank':      { w: 56, h: 48, hp: 18, speed: 1.2, color: '#aaaaff', points: 300, shape: 'tank' },
    'spinner':   { w: 40, h: 40, hp: 11, speed: 2.5, color: '#ff6644', points: 200, shape: 'spinner' },
    'jellyfish': { w: 50, h: 44, hp: 14, speed: 1.5, color: '#dd88ff', points: 250, shape: 'jellyfish' },
    'crystal':   { w: 38, h: 48, hp: 12, speed: 1.8, color: '#88ddff', points: 220, shape: 'crystal' },
    // ---- New enemy types ----
    'sniper':    { w: 38, h: 38, hp:  6, speed: 1.5, color: '#ff7777', points: 230, shape: 'sniper' },
    'shielded':  { w: 46, h: 46, hp:  6, speed: 1.4, color: '#ccddff', points: 380, shape: 'shielded', shielded: true },
    'giant':     { w: 84, h: 84, hp: 320, speed: 0.7, color: '#ddaa44', points: 900, shape: 'giant' },
    'kamikaze':  { w: 38, h: 32, hp:  4, speed: 6.0, color: '#ff3333', points: 320, shape: 'kamikaze', shielded: true },
  };
  const t = baseTypes[type] || baseTypes['blob'];
  return {
    ...t,
    x, y,
    hp: Math.round(t.hp * sm.enemyHPMult),
    maxHp: Math.round(t.hp * sm.enemyHPMult),
    speed: t.speed * sm.enemySpeedMult,
    type,
    angle: 0,
    shotTimer: 60 + Math.random() * 120,
    movePattern: Math.floor(Math.random() * 3),
    startY: y,
    alive: true,
  };
}

function getEnemyTypes(stageIdx) {
  // Per-stage enemy pool. New enemy types unlock per the user's spec:
  //   sniper:   from stage 2 (細いビーム高速狙撃)
  //   shielded: from stage 3 (通常弾を弾く、ビーム/ボムでのみ撃破可)
  //   giant:    from stage 3 (大型・高HP)
  //   kamikaze: from stage 4 (高速体当たり)
  const pools = [
    ['blob', 'dart', 'blob', 'dart'],                                                              // S1
    ['blob', 'eye', 'dart', 'sniper', 'sniper'],                                                   // S2 +sniper
    ['eye', 'dart', 'spinner', 'sniper', 'shielded', 'giant'],                                     // S3 +shielded +giant
    ['spinner', 'tank', 'jellyfish', 'sniper', 'shielded', 'giant', 'kamikaze', 'kamikaze'],       // S4 +kamikaze
    ['tank', 'jellyfish', 'crystal', 'spinner', 'sniper', 'shielded', 'giant', 'kamikaze'],        // S5
    ['tank', 'jellyfish', 'crystal', 'eye', 'dart', 'spinner', 'sniper', 'shielded', 'giant', 'kamikaze'], // S6
  ];
  return pools[stageIdx] || pools[0];
}

// ==================== BOSS ====================
function spawnBoss(stageIdx) {
  const bc = BOSS_CONFIG[stageIdx];
  const sm = STAGE_CONFIG[stageIdx];
  boss = {
    x: CANVAS_W - bc.size - 40,
    y: CANVAS_H/2 - bc.size/2,
    w: bc.size,
    h: bc.size,
    hp: bc.hp,
    maxHp: bc.hp,
    color: bc.color,
    name: bc.name,
    speed: 1.5 + stageIdx * 0.4,
    angle: 0,
    shotTimer: 0,
    shotPattern: 0,
    phase: 1,
    stageIdx,
  };
}

function updateBoss(stageIdx) {
  if (!boss) return;
  boss.angle += 0.02;
  boss.y += Math.sin(boss.angle) * boss.speed;
  boss.y = Math.max(30, Math.min(CANVAS_H - boss.h - 30, boss.y));
  
  // Phase 2 at 50% HP
  if (boss.hp < boss.maxHp * 0.5) boss.phase = 2;
  if (boss.hp < boss.maxHp * 0.25) boss.phase = 3;
  
  // Boss shooting
  boss.shotTimer--;
  const shootInterval = Math.max(15, 45 - stageIdx * 5 - (boss.phase - 1) * 10);
  if (boss.shotTimer <= 0) {
    boss.shotTimer = shootInterval;
    fireBossShot(stageIdx);
  }
  
  if (boss.hp <= 0) {
    // Big explosion
    for (let i = 0; i < 80; i++) {
      const a = Math.random() * Math.PI * 2;
      const spd = 2 + Math.random() * 8;
      particles.push({
        x: boss.x + boss.w/2 + (Math.random()-0.5)*boss.w,
        y: boss.y + boss.h/2 + (Math.random()-0.5)*boss.h,
        vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
        life: 60+Math.random()*60, maxLife: 120,
        color: `hsl(${Math.random()*60}, 100%, 60%)`,
        size: 5 + Math.random()*10
      });
    }
    score += boss.maxHp * 50;
    boss = null;
    bossDefeated = true;
    stageClearTimer = 120;
    gameState = 'stageClear';
    showStageTitle(stage < 6 ? `STAGE ${stage} CLEAR!` : '🌟 GAME CLEAR! 🌟');
    playSound('stage_clear');
  }
}

// Per-stage attack pool — each stage rotates through its own patterns;
// phase 2 (HP<50%) and phase 3 (HP<25%) add more aggressive ones.
const BOSS_PATTERNS = [
  { base: ['straight', 'aimed_burst'],                                      p2: ['spread'],                       p3: [] },
  { base: ['crystal_spray', 'aimed_burst'],                                 p2: ['spiral'],                       p3: ['spread'] },
  { base: ['wave_shot', 'aimed_burst'],                                     p2: ['spiral_dense'],                 p3: ['crystal_spray'] },
  { base: ['homing', 'gravity_orb'],                                        p2: ['spread_dense'],                 p3: ['aimed_burst'] },
  { base: ['laser_sweep', 'carpet_bomb'],                                   p2: ['spread_dense', 'homing'],       p3: ['spiral_dense'] },
  { base: ['laser_sweep', 'spread_dense', 'spiral_dense', 'homing'],        p2: ['crystal_spray', 'gravity_orb'], p3: ['carpet_bomb', 'wave_shot'] },
];

function fireBossShot(stageIdx) {
  const bx = boss.x, by = boss.y + boss.h/2;
  const spd = STAGE_CONFIG[stageIdx].bulletSpeed;
  const col = boss.color;

  const conf = BOSS_PATTERNS[stageIdx] || BOSS_PATTERNS[0];
  let pool = [...conf.base];
  if (boss.phase >= 2) pool = pool.concat(conf.p2);
  if (boss.phase >= 3) pool = pool.concat(conf.p3);
  const pat = pool[boss.shotPattern % pool.length];
  boss.shotPattern++;

  switch (pat) {
    case 'straight': {
      const count = 3 + boss.phase;
      for (let i = 0; i < count; i++) {
        enemyBullets.push({ x: bx, y: by + (i-(count-1)/2)*22, vx: -spd, vy: 0, w: 12, h: 8, color: col });
      }
      break;
    }
    case 'spread': {
      const count = 5 + boss.phase * 2;
      for (let i = 0; i < count; i++) {
        const a = Math.PI + ((i/(count-1)) - 0.5) * (Math.PI/2);
        enemyBullets.push({ x: bx, y: by, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, w: 10, h: 10, color: col });
      }
      break;
    }
    case 'aimed_burst': {
      const dx = player.x - bx, dy = player.y + player.h/2 - by;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      const baseA = Math.atan2(dy, dx);
      const count = 3 + boss.phase;
      for (let i = 0; i < count; i++) {
        const a = baseA + (i - (count-1)/2) * 0.18;
        enemyBullets.push({ x: bx, y: by, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, w: 10, h: 10, color: col });
      }
      break;
    }
    case 'crystal_spray': {
      const count = 10 + stageIdx * 2;
      for (let i = 0; i < count; i++) {
        const a = (i/count) * Math.PI * 2;
        enemyBullets.push({ x: bx+boss.w/2, y: by, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, w: 8, h: 8, color: col });
      }
      break;
    }
    case 'spiral': {
      boss.spiralAngle = (boss.spiralAngle || 0) + 0.4;
      const arms = 2;
      for (let i = 0; i < arms; i++) {
        const a = boss.spiralAngle + (i / arms) * Math.PI * 2;
        enemyBullets.push({ x: bx+boss.w/2, y: by, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, w: 10, h: 10, color: col });
      }
      break;
    }
    case 'spiral_dense': {
      boss.spiralAngle = (boss.spiralAngle || 0) + 0.3;
      const arms = 4;
      for (let i = 0; i < arms; i++) {
        const a = boss.spiralAngle + (i / arms) * Math.PI * 2;
        enemyBullets.push({ x: bx+boss.w/2, y: by, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, w: 10, h: 10, color: col });
      }
      break;
    }
    case 'wave_shot': {
      const count = 3 + boss.phase;
      for (let i = 0; i < count; i++) {
        const baseY = by + (i - (count-1)/2) * 36;
        enemyBullets.push({
          x: bx, y: baseY, vx: -spd, vy: 0, w: 10, h: 10, color: col,
          behavior: 'wave', baseY, waveTime: i * 0.5, waveAmp: 38,
        });
      }
      break;
    }
    case 'homing': {
      const count = 2 + Math.floor(boss.phase / 2);
      for (let i = 0; i < count; i++) {
        const a = Math.PI + (i - (count-1)/2) * 0.4;
        enemyBullets.push({
          x: bx, y: by + (i - (count-1)/2) * 24,
          vx: Math.cos(a)*spd*0.6, vy: Math.sin(a)*spd*0.6,
          w: 12, h: 12, color: '#ff66ff',
          behavior: 'home', hSpeed: spd * 0.85, turnRate: 0.035,
        });
      }
      break;
    }
    case 'spread_dense': {
      const count = 12 + stageIdx;
      for (let i = 0; i < count; i++) {
        const a = Math.PI + ((i/(count-1)) - 0.5) * Math.PI;
        enemyBullets.push({ x: bx+boss.w/2, y: by, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, w: 8, h: 8, color: col });
      }
      break;
    }
    case 'carpet_bomb': {
      const count = 6 + boss.phase;
      for (let i = 0; i < count; i++) {
        const py = 40 + Math.random() * (CANVAS_H - 80);
        enemyBullets.push({ x: CANVAS_W + 20, y: py, vx: -spd*1.4, vy: 0, w: 12, h: 8, color: '#ff8800' });
      }
      break;
    }
    case 'gravity_orb': {
      const cx = player.x + 60, cy = player.y + player.h/2;
      const count = 4;
      for (let i = 0; i < count; i++) {
        const a = (i/count) * Math.PI * 2;
        enemyBullets.push({
          x: cx + Math.cos(a)*60, y: cy + Math.sin(a)*60,
          vx: 0, vy: 0,
          w: 14, h: 14, color: '#aa44ff',
          behavior: 'orbit', cx, cy, orbitR: 60, orbitA: a, orbitSpeed: 0.045,
          life: 360,
        });
      }
      break;
    }
    case 'laser_sweep': {
      const count = 5 + boss.phase;
      const baseY = player.y + player.h/2;
      for (let i = 0; i < count; i++) {
        enemyBullets.push({
          x: bx, y: baseY + (i - (count-1)/2) * 8,
          vx: -spd * 2, vy: 0, w: 30, h: 4, color: '#ff44ff',
        });
      }
      break;
    }
  }
}

// ==================== UPDATE ====================
function updatePlayer() {
  if (gameState !== 'playing') return;

  const stageIdx = stage - 1;
  const spd = player.speed;
  let dx = 0, dy = 0;

  if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
  if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
  if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) dx += 1;

  dx += joystick.dx;
  dy += joystick.dy;
  dx += gpInput.dx;
  dy += gpInput.dy;

  const len = Math.sqrt(dx*dx+dy*dy);
  if (len > 1) { dx/=len; dy/=len; }

  player.x += dx * spd;
  player.y += dy * spd;

  // Bounds
  player.x = Math.max(0, Math.min(CANVAS_W - player.w, player.x));
  player.y = Math.max(0, Math.min(CANVAS_H - player.h, player.y));

  // Terrain clamp — sample heights along player width
  let topMax = 0, botMin = CANVAS_H;
  for (let sx = 15; sx <= player.w - 15; sx += 20) {
    const { top, bot } = getTerrainAt(player.x + sx, stageIdx);
    if (top > topMax) topMax = top;
    if (bot < botMin) botMin = bot;
  }
  if (player.y < topMax) player.y = topMax;
  if (player.y + player.h > botMin) player.y = botMin - player.h;
  
  if (player.invincible > 0) player.invincible--;
  if (player.hitFlash > 0) player.hitFlash--;
  
  // Auto-fire (keyboard / mobile / gamepad)
  if (keys['Space'] || keys['KeyZ'] || mobileShootHeld || gpInput.shoot) {
    if (!beamActive) fireShot();
  }
  
  // Beam timer — damage per frame scales with upgrade level
  if (beamActive) {
    beamTimer--;
    const beamCY = player.y + player.h * 0.42;
    const beamHalf = 130;
    const beamDmg = 0.5 + player.upgradeLevel * 0.18; // LV0:0.5/f .. LV15:3.2/f
    for (let e of enemies) {
      if (e.y + e.h > beamCY - beamHalf && e.y < beamCY + beamHalf) {
        e.hp -= beamDmg;
        addHitEffect(e.x + e.w/2, e.y + e.h/2, '#88ffff');
      }
    }
    if (boss) {
      if (boss.y + boss.h > beamCY - beamHalf && boss.y < beamCY + beamHalf) {
        boss.hp -= beamDmg;
      }
    }
    if (beamTimer <= 0) {
      beamActive = false;
      player.beamMode = false;
    }
  }
  
  // Update guardians
  for (let g of guardians) {
    g.angle += g.speed;
  }
}

function updateBullets() {
  const stageIdx = stage - 1;
  // Player bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.x > CANVAS_W + 20 || b.x < -40 || b.y < -20 || b.y > CANVAS_H + 20) {
      bullets.splice(i, 1);
      continue;
    }
    // Terrain blocks bullets
    const { top, bot } = getTerrainAt(b.x, stageIdx);
    if (b.y < top || b.y > bot) {
      bullets.splice(i, 1);
    }
  }
  // Enemy bullets
  for (let i = enemyBullets.length-1; i >= 0; i--) {
    const b = enemyBullets[i];
    if (b.behavior === 'orbit') {
      b.orbitA += b.orbitSpeed;
      b.cx += (player.x + 50 - b.cx) * 0.005;
      b.cy += (player.y + player.h/2 - b.cy) * 0.005;
      b.x = b.cx + Math.cos(b.orbitA) * b.orbitR;
      b.y = b.cy + Math.sin(b.orbitA) * b.orbitR;
    } else if (b.behavior === 'wave') {
      b.waveTime = (b.waveTime || 0) + 0.18;
      b.x += b.vx;
      b.y = b.baseY + Math.sin(b.waveTime) * (b.waveAmp || 30);
    } else if (b.behavior === 'home') {
      const px = player.x + player.w/2;
      const py = player.y + player.h/2;
      const dx = px - b.x, dy = py - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const tvx = dx/dist * (b.hSpeed || 4);
      const tvy = dy/dist * (b.hSpeed || 4);
      const tr = b.turnRate || 0.05;
      b.vx = b.vx * (1 - tr) + tvx * tr;
      b.vy = b.vy * (1 - tr) + tvy * tr;
      b.x += b.vx; b.y += b.vy;
    } else {
      b.x += b.vx; b.y += b.vy;
    }
    if (b.life !== undefined) {
      b.life--;
      if (b.life <= 0) { enemyBullets.splice(i, 1); continue; }
    }
    if (b.x < -30 || b.x > CANVAS_W+30 || b.y < -30 || b.y > CANVAS_H+30) {
      enemyBullets.splice(i, 1);
      continue;
    }
    // Terrain blocks enemy bullets too
    const { top, bot } = getTerrainAt(b.x, stageIdx);
    if (b.y < top || b.y > bot) {
      enemyBullets.splice(i, 1);
    }
  }
}

function updateEnemies(stageIdx) {
  const sm = STAGE_CONFIG[stageIdx];
  
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    e.angle += 0.05;

    // ---- Movement ----
    if (e.type === 'kamikaze') {
      // High-speed ramming: always charges directly at player
      const px = player.x + player.w/2, py = player.y + player.h/2;
      const dx = px - (e.x+e.w/2), dy = py - (e.y+e.h/2);
      const d = Math.sqrt(dx*dx+dy*dy) || 1;
      e.x += dx/d * e.speed;
      e.y += dy/d * e.speed;
    } else if (e.type === 'giant') {
      // Slow horizontal march (no diving — too easy to dodge otherwise)
      e.x -= e.speed;
    } else {
      switch (e.movePattern) {
        case 0: // straight
          e.x -= e.speed;
          break;
        case 1: // sine wave
          e.x -= e.speed;
          e.y = e.startY + Math.sin(e.angle * 2) * 60;
          break;
        case 2: // dive
          e.x -= e.speed * 0.7;
          if (e.x < CANVAS_W * 0.7) {
            const px = player.x + player.w/2, py = player.y + player.h/2;
            const dx = px - (e.x+e.w/2), dy = py - (e.y+e.h/2);
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist > 1) { e.x += dx/dist * e.speed * 0.5; e.y += dy/dist * e.speed * 0.5; }
          }
          break;
      }
    }

    // ---- Shooting ----
    e.shotTimer--;
    if (e.shotTimer <= 0 && e.x < CANVAS_W - 50 && e.x > 0) {
      const ex = e.x, ey = e.y + e.h/2;
      const dx = player.x + player.w/2 - ex;
      const dy = player.y + player.h/2 - ey;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      if (e.type === 'kamikaze') {
        // Doesn't shoot — body-slams instead
        e.shotTimer = 9999;
      } else if (e.type === 'sniper') {
        // Thin fast laser needle aimed at player (telegraphed via charge glow)
        e.shotTimer = 90 + Math.random() * 50;
        const sniperSpd = sm.bulletSpeed * 2.4;
        enemyBullets.push({
          x: ex, y: ey,
          vx: sniperSpd * dx/dist, vy: sniperSpd * dy/dist,
          w: 22, h: 3, color: '#ff5555',
        });
      } else if (e.type === 'giant') {
        // Giant fires a slow heavy 3-shot spread
        e.shotTimer = 110 + Math.random() * 50;
        const gspd = sm.bulletSpeed * 0.85;
        for (let s = -1; s <= 1; s++) {
          const baseA = Math.atan2(dy, dx);
          const a = baseA + s * 0.18;
          enemyBullets.push({
            x: ex, y: ey,
            vx: Math.cos(a) * gspd, vy: Math.sin(a) * gspd,
            w: 14, h: 14, color: '#ffcc66',
          });
        }
      } else {
        e.shotTimer = 60 + Math.random()*80;
        const spd = sm.bulletSpeed;
        enemyBullets.push({ x: ex, y: ey, vx: spd*dx/dist, vy: spd*dy/dist, w: 8, h: 8, color: e.color });
      }
    }
    
    // Out of bounds
    if (e.x + e.w < -20 || e.hp <= 0) {
      if (e.hp <= 0) {
        score += e.points;
        addHitEffect(e.x+e.w/2, e.y+e.h/2, e.color);
        // Item drop — independent rates per type, mutually exclusive
        // (10% upgrade / 10% guardian / 5% heal / 75% nothing)
        const r = Math.random();
        let type = null;
        if (r < 0.10) type = 'upgrade';
        else if (r < 0.20) type = 'guardian';
        else if (r < 0.25) type = 'heal';
        if (type) {
          items.push({
            x: e.x+e.w/2, y: e.y+e.h/2,
            vx: -1.5, vy: (Math.random()-0.5),
            type,
            life: 300,
          });
        }
      }
      enemies.splice(i, 1);
    }
  }
}

// ==================== COLLISION ====================
function checkCollisions(stageIdx) {
  // Player bullets vs enemies (pierce keeps bullet alive)
  // Shielded enemies deflect ALL normal shots — only beam/bomb can damage them.
  for (let bi = bullets.length-1; bi >= 0; bi--) {
    const b = bullets[bi];
    let consumed = false;
    for (let ei = enemies.length-1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (b.x < e.x+e.w && b.x+b.w > e.x && b.y < e.y+e.h && b.y+b.h > e.y) {
        if (e.shielded) {
          // Deflect — no damage, but show shield spark
          addHitEffect(b.x, b.y, '#88ddff');
          if (!b.pierce) { bullets.splice(bi, 1); consumed = true; break; }
          // Pierce bullets get blocked too (no damage), but keep traveling
          continue;
        }
        e.hp -= (b.dmg || 1);
        addHitEffect(b.x, b.y, '#ffffff');
        if (!b.pierce) { bullets.splice(bi, 1); consumed = true; break; }
      }
    }
    if (consumed) continue;
  }

  // Player bullets vs boss
  if (boss) {
    for (let bi = bullets.length-1; bi >= 0; bi--) {
      const b = bullets[bi];
      if (b.x < boss.x+boss.w && b.x+b.w > boss.x && b.y < boss.y+boss.h && b.y+b.h > boss.y) {
        boss.hp -= (b.dmg || 1);
        addHitEffect(b.x, b.y, '#ffffff');
        if (!b.pierce) bullets.splice(bi, 1);
      }
    }
  }
  
  if (player.invincible > 0) return;
  
  // Enemy bullets vs player
  for (let bi = enemyBullets.length-1; bi >= 0; bi--) {
    const b = enemyBullets[bi];
    const px = player.x + 15, py = player.y + 10, pw = player.w - 30, ph = player.h - 20;
    if (b.x < px+pw && b.x+b.w > px && b.y < py+ph && b.y+b.h > py) {
      enemyBullets.splice(bi, 1);
      playerHit();
    }
  }
  
  // Enemies vs player (collision)
  for (let e of enemies) {
    const px = player.x + 15, py = player.y + 10, pw = player.w - 30, ph = player.h - 20;
    if (e.x < px+pw && e.x+e.w > px && e.y < py+ph && e.y+e.h > py) {
      playerHit();
      e.hp = 0;
    }
  }
}

function playerHit() {
  if (player.invincible > 0) return;
  
  if (guardians.length > 0) {
    // Guardian absorbs hit
    guardians.pop();
    player.invincible = 60;
    player.hitFlash = 60;
    addHitEffect(player.x + player.w/2, player.y + player.h/2, '#ffff00');
    return;
  }
  
  player.life--;
  player.hitFlash = 120;
  player.invincible = 120;
  // Reset upgrades on hit
  player.upgradeLevel = Math.max(0, player.upgradeLevel - 2);
  
  addHitEffect(player.x + player.w/2, player.y + player.h/2, '#ff4444');
  playSound('player_hit');
  
  if (player.life <= 0) {
    gameState = 'gameOver';
    stopBGM();
    showStageTitle('GAME OVER');
  }
}

function addHitEffect(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 20+Math.random()*20, maxLife: 40, color, size: 2+Math.random()*4 });
  }
}

// ==================== ITEMS ====================
const MAX_UPGRADE = 15;
const MAX_LIFE = 5;
function updateItems() {
  for (let i = items.length-1; i >= 0; i--) {
    const it = items[i];
    it.x += it.vx; it.y += it.vy;
    it.life--;

    // Player collect
    if (it.x < player.x+player.w && it.x+20 > player.x &&
        it.y < player.y+player.h && it.y+20 > player.y) {
      if (it.type === 'upgrade') {
        // Pure attack upgrade — does NOT add guardians
        player.upgradeLevel = Math.min(MAX_UPGRADE, player.upgradeLevel + 1);
        score += 50;
        addHitEffect(it.x, it.y, '#ffff88');
        playSound('upgrade');
      } else if (it.type === 'guardian') {
        // Guardian item — adds one guardian (capped)
        if (guardians.length < MAX_GUARDIANS) {
          addGuardian();
          score += 100;
        } else {
          // already maxed → small score consolation
          score += 20;
        }
        addHitEffect(it.x, it.y, '#88ddff');
        playSound('upgrade');
      } else if (it.type === 'heal') {
        // Heal item — restores 1 life (capped); bonus score if already full
        if (player.life < MAX_LIFE) {
          player.life++;
          score += 100;
        } else {
          score += 30;
        }
        addHitEffect(it.x, it.y, '#ff88aa');
        playSound('upgrade');
      }
      items.splice(i, 1);
      continue;
    }

    if (it.life <= 0 || it.x < -30) items.splice(i, 1);
  }
}

// ==================== SPAWN ====================
function spawnEnemies(stageIdx) {
  const sm = STAGE_CONFIG[stageIdx];
  const killCount = Math.floor(frameCount / 60);

  if (enemies.length + (boss ? 1 : 0) >= (15 + stageIdx * 5)) return;
  if (frameCount % sm.spawnRate !== 0) return;
  if (bossSpawned) return;

  // Boss appears after a per-stage delay (seconds): 60s, 75s, 90s, 105s, 120s, 135s
  const bossDelaySec = [60, 75, 90, 105, 120, 135][stageIdx] || 60;
  const bossAt = bossDelaySec * 60;
  if (frameCount >= bossAt && !bossSpawned) {
    enemies = [];
    bossSpawned = true;
    spawnBoss(stageIdx);
    showStageTitle(BOSS_CONFIG[stageIdx].name + '\n出現！');
    playSound('boss_appear');
    startBGM(stageIdx, true);
    return;
  }
  
  const types = getEnemyTypes(stageIdx);
  const type = types[Math.floor(Math.random() * types.length)];
  const y = 40 + Math.random() * (CANVAS_H - 100);
  enemies.push(createEnemy(type, CANVAS_W + 20, y, stageIdx));
}

// ==================== PARTICLES ====================
function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ==================== DRAW ====================
function drawStars() {
  for (let s of stars) {
    s.x -= s.speed;
    if (s.x < 0) { s.x = CANVAS_W; s.y = Math.random() * CANVAS_H; }
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle = s.color;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

function drawEnemy(e) {
  ctx.save();
  const cx = e.x + e.w/2, cy = e.y + e.h/2;
  
  // Flash when low HP
  if (e.hp < e.maxHp * 0.3 && Math.floor(frameCount/4) % 2) {
    ctx.globalAlpha = 0.5;
  }
  
  ctx.shadowBlur = 15;
  ctx.shadowColor = e.color;
  ctx.fillStyle = e.color;
  ctx.strokeStyle = '#ffffff44';
  ctx.lineWidth = 1;
  
  switch(e.shape) {
    case 'blob': {
      ctx.beginPath();
      ctx.ellipse(cx, cy, e.w/2, e.h/2, e.angle*0.5, 0, Math.PI*2);
      ctx.fill();
      // Eyes
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(cx-8, cy-5, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+8, cy-5, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f00';
      ctx.beginPath(); ctx.arc(cx-8, cy-5, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+8, cy-5, 2, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'eye': {
      ctx.beginPath(); ctx.arc(cx, cy, e.w/2, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(cx, cy, e.w/3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff0000';
      ctx.beginPath(); ctx.arc(cx + Math.cos(e.angle)*8, cy + Math.sin(e.angle)*8, e.w/6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(cx + Math.cos(e.angle)*8, cy + Math.sin(e.angle)*8, e.w/10, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'dart': {
      ctx.beginPath();
      ctx.moveTo(e.x, cy);
      ctx.lineTo(e.x+e.w, cy-e.h/2);
      ctx.lineTo(e.x+e.w*0.7, cy);
      ctx.lineTo(e.x+e.w, cy+e.h/2);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    }
    case 'tank': {
      ctx.fillRect(e.x, cy-e.h/2+5, e.w, e.h-10);
      ctx.fillStyle = '#ffffff44';
      ctx.fillRect(e.x, cy-4, e.w+10, 8);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff88';
      for (let j = 0; j < 3; j++) {
        ctx.fillRect(e.x + 5 + j*14, cy-10, 10, 20);
      }
      break;
    }
    case 'spinner': {
      ctx.translate(cx, cy);
      ctx.rotate(e.angle * 3);
      for (let j = 0; j < 4; j++) {
        ctx.rotate(Math.PI/2);
        ctx.fillRect(-e.w/2, -5, e.w/2, 10);
      }
      break;
    }
    case 'jellyfish': {
      ctx.beginPath();
      ctx.ellipse(cx, cy - e.h/6, e.w/2, e.h/3, 0, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      for (let j = 0; j < 5; j++) {
        const tx = e.x + 8 + j*(e.w-16)/4;
        const ty = cy + e.h/6;
        const sway = Math.sin(e.angle*2 + j) * 8;
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx+sway, ty+e.h/2); ctx.stroke();
      }
      break;
    }
    case 'crystal': {
      ctx.beginPath();
      ctx.moveTo(cx, e.y);
      ctx.lineTo(e.x+e.w, cy);
      ctx.lineTo(cx, e.y+e.h);
      ctx.lineTo(e.x, cy);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#ffffff44';
      ctx.beginPath();
      ctx.moveTo(cx, e.y+5);
      ctx.lineTo(e.x+e.w-10, cy);
      ctx.lineTo(cx, e.y+e.h/2);
      ctx.closePath(); ctx.fill();
      break;
    }
    case 'sniper': {
      // Sniper drone: round body + barrel + charge glow when about to fire
      ctx.beginPath(); ctx.arc(cx + 4, cy, e.w*0.34, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      // Barrel (pointing left toward player)
      ctx.fillStyle = '#552222';
      ctx.fillRect(e.x - 8, cy - 2, 18, 4);
      // Sight (small dark spot)
      ctx.fillStyle = '#220000';
      ctx.beginPath(); ctx.arc(cx + 4, cy, 4, 0, Math.PI*2); ctx.fill();
      // Charge glow when shotTimer is about to fire
      if (e.shotTimer < 30 && e.shotTimer > 0) {
        const ch = (30 - e.shotTimer) / 30;
        ctx.shadowBlur = 14;
        ctx.shadowColor = '#ff3333';
        ctx.fillStyle = `rgba(255,${100 - ch*60},${100 - ch*60},${0.6 + ch*0.4})`;
        ctx.beginPath(); ctx.arc(e.x - 6, cy, 3 + ch*5, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'shielded': {
      // Inner core
      ctx.beginPath(); ctx.arc(cx, cy, e.w*0.28, 0, Math.PI*2); ctx.fill();
      // Outer shield ring (rotates)
      ctx.shadowBlur = 22;
      ctx.shadowColor = '#aaccff';
      ctx.strokeStyle = '#ddeeff';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(cx, cy, e.w/2 - 2, 0, Math.PI*2); ctx.stroke();
      // Bright rotating arc highlights
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2.5;
      for (let j = 0; j < 4; j++) {
        const a = e.angle * 2 + j * Math.PI/2;
        ctx.beginPath();
        ctx.arc(cx, cy, e.w/2 - 2, a, a + 0.35);
        ctx.stroke();
      }
      // "BEAM/BOMB ONLY" inner cross (subtle marker)
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('★', cx, cy + 3);
      break;
    }
    case 'giant': {
      // Big armored sphere with rotating plates and glowing eye
      ctx.beginPath(); ctx.arc(cx, cy, e.w/2 - 4, 0, Math.PI*2); ctx.fill();
      ctx.stroke();
      ctx.shadowBlur = 0;
      // Rotating armor plates
      ctx.fillStyle = '#aa7733';
      for (let j = 0; j < 8; j++) {
        const a = j / 8 * Math.PI * 2 + e.angle * 0.4;
        const px = cx + Math.cos(a) * (e.w/2 - 12);
        const py = cy + Math.sin(a) * (e.w/2 - 12);
        ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI*2); ctx.fill();
      }
      // Glowing red core eye
      ctx.shadowBlur = 14;
      ctx.shadowColor = '#ff3333';
      ctx.fillStyle = '#ff4444';
      ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffeecc';
      ctx.beginPath(); ctx.arc(cx + Math.cos(e.angle)*4, cy + Math.sin(e.angle)*4, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000000';
      ctx.beginPath(); ctx.arc(cx + Math.cos(e.angle)*4, cy + Math.sin(e.angle)*4, 3, 0, Math.PI*2); ctx.fill();
      break;
    }
    case 'kamikaze': {
      // Pointed arrow facing toward the player
      const px = player.x + player.w/2, py = player.y + player.h/2;
      const ang = Math.atan2(py - cy, px - cx);
      ctx.translate(cx, cy);
      ctx.rotate(ang);
      ctx.beginPath();
      ctx.moveTo(e.w/2, 0);
      ctx.lineTo(-e.w/2, -e.h/2);
      ctx.lineTo(-e.w/3, 0);
      ctx.lineTo(-e.w/2, e.h/2);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // Inner glow stripe
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffaa66';
      ctx.beginPath();
      ctx.moveTo(e.w/3, 0);
      ctx.lineTo(-e.w/4, -e.h/4);
      ctx.lineTo(-e.w/4, e.h/4);
      ctx.closePath(); ctx.fill();
      // Trailing flame
      ctx.fillStyle = `rgba(255,180,80,${0.5 + Math.random()*0.4})`;
      ctx.beginPath();
      ctx.moveTo(-e.w/2, -e.h/3);
      ctx.lineTo(-e.w/2 - 12 - Math.random()*6, 0);
      ctx.lineTo(-e.w/2, e.h/3);
      ctx.closePath(); ctx.fill();
      break;
    }
  }
  
  ctx.restore();
  
  // HP bar
  if (e.hp < e.maxHp) {
    const bw = e.w, bh = 4;
    ctx.fillStyle = '#333';
    ctx.fillRect(e.x, e.y - 8, bw, bh);
    ctx.fillStyle = e.hp > e.maxHp*0.5 ? '#44ff44' : '#ff4444';
    ctx.fillRect(e.x, e.y - 8, bw * (e.hp/e.maxHp), bh);
  }
}

function drawBoss() {
  if (!boss) return;
  const cx = boss.x + boss.w/2, cy = boss.y + boss.h/2;
  
  ctx.save();
  ctx.shadowBlur = 30 + Math.sin(frameCount*0.1)*10;
  ctx.shadowColor = boss.color;
  
  // Flash phase 3
  if (boss.phase === 3 && Math.floor(frameCount/3) % 2) ctx.globalAlpha = 0.7;
  
  // Draw boss body
  ctx.fillStyle = boss.color;
  ctx.beginPath(); ctx.arc(cx, cy, boss.w/2, 0, Math.PI*2); ctx.fill();
  
  // Inner details
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000000aa';
  ctx.beginPath(); ctx.arc(cx, cy, boss.w/3, 0, Math.PI*2); ctx.fill();
  
  // Eyes
  for (let j = 0; j < (boss.phase + 1); j++) {
    const ea = (j/(boss.phase+1))*Math.PI*2 + boss.angle;
    const er = boss.w/3;
    const ex = cx + Math.cos(ea)*er*0.6, ey = cy + Math.sin(ea)*er*0.6;
    ctx.fillStyle = '#ff0000';
    ctx.beginPath(); ctx.arc(ex, ey, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffff00';
    ctx.beginPath(); ctx.arc(ex, ey, 4, 0, Math.PI*2); ctx.fill();
  }
  
  // Tentacles
  ctx.strokeStyle = boss.color + 'aa';
  ctx.lineWidth = 4;
  for (let j = 0; j < 8; j++) {
    const a = (j/8)*Math.PI*2 + boss.angle;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*boss.w/2, cy + Math.sin(a)*boss.h/2);
    ctx.quadraticCurveTo(
      cx + Math.cos(a+0.5)*(boss.w/2+20), cy + Math.sin(a+0.5)*(boss.h/2+20),
      cx + Math.cos(a+1)*(boss.w/2+5), cy + Math.sin(a+1)*(boss.h/2+5)
    );
    ctx.stroke();
  }
  
  ctx.restore();
  
  // Boss HP bar
  const barW = boss.w * 2;
  const bx = boss.x + boss.w/2 - barW/2;
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, boss.y - 20, barW, 10);
  const pct = boss.hp / boss.maxHp;
  const barColor = pct > 0.5 ? '#44ff44' : pct > 0.25 ? '#ffaa00' : '#ff2244';
  ctx.fillStyle = barColor;
  ctx.fillRect(bx, boss.y - 20, barW * pct, 10);
  ctx.strokeStyle = '#ffffff44';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, boss.y - 20, barW, 10);
  
  // Boss name
  ctx.fillStyle = boss.color;
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, boss.x + boss.w/2, boss.y - 25);
}

function drawPlayer() {
  if (gameState !== 'playing' && gameState !== 'stageClear') return;
  
  const img = beamActive ? images.beam : (player.hitFlash > 0 ? images.hit : images.player);
  
  if (player.invincible > 0 && Math.floor(player.invincible/4) % 2) {
    ctx.globalAlpha = 0.4;
  }
  
  ctx.shadowBlur = beamActive ? 30 : 10;
  ctx.shadowColor = beamActive ? '#00ffff' : '#ff88cc';
  
  if (img && img.complete) {
    ctx.drawImage(img, player.x, player.y, player.w, player.h);
  } else {
    // Fallback
    ctx.fillStyle = '#ff88cc';
    ctx.fillRect(player.x, player.y, player.w, player.h);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  
  // Beam effect — emits from inside the character (wand/broom tip)
  if (beamActive) {
    const ox = player.x + player.w * 0.75;   // emission origin X (near broom/wand tip)
    const oy = player.y + player.h * 0.42;   // emission origin Y
    const beamW = CANVAS_W - ox;
    const t = frameCount * 0.3;
    const pulse = 0.88 + Math.sin(t * 0.9) * 0.12;
    const beamH = 280 * pulse;

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';

    // ---- (A) Outer crackling lightning tendrils (replaces wavy envelope) ----
    // Subtle violet base haze so the beam still has color presence
    const haze = ctx.createLinearGradient(ox, oy, CANVAS_W, oy);
    haze.addColorStop(0, 'rgba(220,150,255,0.28)');
    haze.addColorStop(0.5, 'rgba(180,140,255,0.16)');
    haze.addColorStop(1, 'rgba(120,200,255,0)');
    ctx.fillStyle = haze;
    ctx.beginPath();
    const hazeH = beamH * 0.95;
    ctx.roundRect(ox, oy - hazeH/2, beamW, hazeH, [hazeH/2, 0, 0, hazeH/2]);
    ctx.fill();

    // Crackling lightning bolts radiating outward from the beam
    const drawBolt = (sx, sy, dirY, segs, jitterX, stepY, branchProb) => {
      let cx = sx, cy = sy;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      for (let s = 0; s < segs; s++) {
        cx += (Math.random() - 0.5) * jitterX;
        cy += dirY * (stepY * (0.6 + Math.random() * 0.8));
        ctx.lineTo(cx, cy);
      }
      ctx.stroke();
      if (Math.random() < branchProb) {
        let bx = cx, by = cy;
        ctx.beginPath();
        ctx.moveTo(bx, by);
        for (let s = 0; s < 2; s++) {
          bx += (Math.random() - 0.5) * jitterX * 0.7;
          by += dirY * (stepY * 0.5);
          ctx.lineTo(bx, by);
        }
        ctx.stroke();
      }
    };

    // Outer thick electric arcs (cyan/white, glowing)
    ctx.strokeStyle = 'rgba(220,255,255,0.95)';
    ctx.lineWidth = 1.8;
    ctx.shadowBlur = 16;
    ctx.shadowColor = '#88ddff';
    const tendrilCount = 14;
    for (let n = 0; n < tendrilCount; n++) {
      const startX = ox + 20 + Math.random() * (beamW - 40);
      const dir = Math.random() < 0.5 ? -1 : 1;
      const startY = oy + dir * (38 + Math.random() * 18);
      drawBolt(startX, startY, dir, 4 + Math.floor(Math.random() * 3), 30, 22, 0.5);
    }

    // Thinner secondary arcs (faint, more bolts for density)
    ctx.strokeStyle = 'rgba(200,220,255,0.55)';
    ctx.lineWidth = 1;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#aaccff';
    for (let n = 0; n < 10; n++) {
      const startX = ox + 30 + Math.random() * (beamW - 50);
      const dir = Math.random() < 0.5 ? -1 : 1;
      const startY = oy + dir * (30 + Math.random() * 14);
      drawBolt(startX, startY, dir, 3 + Math.floor(Math.random() * 3), 24, 18, 0.3);
    }

    // Bright pink/violet hot bolts (sparse, accent color)
    ctx.strokeStyle = 'rgba(255,180,255,0.9)';
    ctx.lineWidth = 1.4;
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#ff88ff';
    for (let n = 0; n < 4; n++) {
      const startX = ox + 40 + Math.random() * (beamW - 60);
      const dir = Math.random() < 0.5 ? -1 : 1;
      const startY = oy + dir * (44 + Math.random() * 20);
      drawBolt(startX, startY, dir, 5 + Math.floor(Math.random() * 3), 36, 26, 0.6);
    }
    ctx.shadowBlur = 0;

    // Helper: rectangle with rounded left side (semicircular cap)
    const leftCapRect = (x, y, w, h) => {
      const r = Math.min(h / 2, w / 2);
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, [r, 0, 0, r]);
      ctx.fill();
    };

    // ---- (B) Chromatic aberration: red strand above, blue strand below ----
    ctx.fillStyle = 'rgba(255,80,180,0.45)';
    leftCapRect(ox, oy - 28, beamW, 14);
    ctx.fillStyle = 'rgba(80,160,255,0.45)';
    leftCapRect(ox, oy + 14, beamW, 14);

    // ---- (C) Cyan plasma main body ----
    const body = ctx.createLinearGradient(ox, oy, CANVAS_W, oy);
    body.addColorStop(0, 'rgba(220,255,255,1)');
    body.addColorStop(0.4, 'rgba(120,230,255,0.85)');
    body.addColorStop(1, 'rgba(0,180,255,0)');
    ctx.fillStyle = body;
    leftCapRect(ox, oy - beamH/3, beamW, beamH * 2/3);

    // ---- (D) Hot inner core (flickers each frame) ----
    const flicker = 0.85 + Math.random() * 0.15;
    ctx.fillStyle = `rgba(255,255,255,${flicker})`;
    leftCapRect(ox, oy - 26, beamW, 52);

    // ---- (E) Ultra-bright center line ----
    ctx.fillStyle = '#ffffff';
    leftCapRect(ox, oy - 6, beamW, 12);

    // ---- (F) Energy rings traveling along the beam ----
    for (let i = 0; i < 6; i++) {
      const phase = (t * 6 + i * 80) % beamW;
      const rx = ox + phase;
      const rh = 40 + Math.sin(phase * 0.05) * 20;
      const ringGrad = ctx.createRadialGradient(rx, oy, 0, rx, oy, rh);
      ringGrad.addColorStop(0, 'rgba(255,255,255,0)');
      ringGrad.addColorStop(0.7, 'rgba(180,255,255,0.5)');
      ringGrad.addColorStop(1, 'rgba(120,200,255,0)');
      ctx.fillStyle = ringGrad;
      ctx.beginPath();
      ctx.ellipse(rx, oy, 14, rh, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // ---- (G) Electric arcs zig-zagging through the beam ----
    ctx.strokeStyle = 'rgba(230,255,255,0.95)';
    ctx.lineWidth = 1.8;
    ctx.shadowBlur = 16;
    ctx.shadowColor = '#aaffff';
    for (let arc = 0; arc < 4; arc++) {
      ctx.beginPath();
      let cx = ox, cy = oy + (Math.random() - 0.5) * 30;
      ctx.moveTo(cx, cy);
      while (cx < CANVAS_W) {
        cx += 14 + Math.random() * 18;
        cy = oy + (Math.random() - 0.5) * (beamH * 0.42);
        ctx.lineTo(cx, cy);
      }
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // ---- (H) Charge core at emission point — large layered radial glow ----
    // (visually anchors the beam to the character)
    for (let r = 90; r > 0; r -= 12) {
      const intensity = (1 - r / 90) * 0.55 + 0.05;
      const cg = ctx.createRadialGradient(ox, oy, 0, ox, oy, r);
      cg.addColorStop(0, `rgba(255,255,255,${intensity})`);
      cg.addColorStop(0.4, `rgba(200,240,255,${intensity * 0.6})`);
      cg.addColorStop(1, 'rgba(120,180,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.arc(ox, oy, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // ---- (I) White-hot core dot at emission ----
    const coreR = 16 + Math.sin(t * 2) * 4 + Math.random() * 3;
    const coreG = ctx.createRadialGradient(ox, oy, 0, ox, oy, coreR);
    coreG.addColorStop(0, 'rgba(255,255,255,1)');
    coreG.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = coreG;
    ctx.beginPath();
    ctx.arc(ox, oy, coreR, 0, Math.PI * 2);
    ctx.fill();

    // ---- (J) Radial spikes from emission point ----
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 2.5;
    for (let s = 0; s < 12; s++) {
      const a = (s / 12) * Math.PI * 2 + t * 0.04;
      const r1 = 22, r2 = 44 + Math.random() * 32;
      ctx.beginPath();
      ctx.moveTo(ox + Math.cos(a) * r1, oy + Math.sin(a) * r1);
      ctx.lineTo(ox + Math.cos(a) * r2, oy + Math.sin(a) * r2);
      ctx.stroke();
    }

    // ---- (K) Forward-flying sparkles along the beam ----
    for (let i = 0; i < 22; i++) {
      const sx = ox + Math.random() * beamW;
      const sy = oy + (Math.random() - 0.5) * beamH * 0.55;
      const sz = 1 + Math.random() * 3;
      ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.random() * 0.5})`;
      ctx.fillRect(sx, sy, sz, sz);
    }

    // ---- (L) Trailing micro-particles backward (suction effect) ----
    for (let i = 0; i < 10; i++) {
      const ang = (Math.random() - 0.5) * Math.PI * 0.6 + Math.PI;
      const dist = 30 + Math.random() * 80;
      const px = ox + Math.cos(ang) * dist;
      const py = oy + Math.sin(ang) * dist;
      ctx.fillStyle = `rgba(180,240,255,${0.4 + Math.random() * 0.4})`;
      ctx.fillRect(px, py, 2, 2);
    }

    ctx.restore();
  }
  
  // Draw guardians
  for (let g of guardians) {
    const gx = player.x + player.w/2 + Math.cos(g.angle) * g.radius - GUARDIAN_W/2;
    const gy = player.y + player.h/2 + Math.sin(g.angle) * g.radius - GUARDIAN_H/2;
    if (images.guardian && images.guardian.complete) {
      ctx.drawImage(images.guardian, gx, gy, GUARDIAN_W, GUARDIAN_H);
    } else {
      ctx.fillStyle = '#aaffff';
      ctx.fillRect(gx, gy, GUARDIAN_W, GUARDIAN_H);
    }
  }
}

function drawBullets() {
  for (let b of bullets) {
    ctx.shadowBlur = 8;
    ctx.shadowColor = b.color;
    ctx.fillStyle = b.color;
    if (b.beam) {
      ctx.fillRect(b.x, b.y - b.h/2, b.w, b.h);
    } else {
      ctx.beginPath();
      ctx.ellipse(b.x + b.w/2, b.y, b.w/2, b.h/2, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }
  
  for (let b of enemyBullets) {
    ctx.shadowBlur = 10;
    ctx.shadowColor = b.color;
    ctx.fillStyle = b.color;
    if (b.w / b.h >= 3 || b.h / b.w >= 3) {
      // Thin/elongated bullet (sniper laser needle, etc.) — draw as a streak
      const ang = Math.atan2(b.vy, b.vx);
      ctx.save();
      ctx.translate(b.x + b.w/2, b.y + b.h/2);
      ctx.rotate(ang);
      ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
      // Bright leading tip
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(b.w/2 - 4, -b.h/2, 4, b.h);
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(b.x + b.w/2, b.y + b.h/2, Math.max(b.w, b.h)/2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }
}

function drawParticles() {
  for (let p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life/p.maxLife), 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawItems() {
  for (let it of items) {
    const t = it.life / 300;
    ctx.globalAlpha = t > 0.3 ? 1 : t / 0.3;

    if (it.type === 'guardian') {
      // Guardian item: pulsing blue ring with orbiting dot
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#66ddff';
      ctx.save();
      ctx.translate(it.x, it.y);
      const pulse = 12 + Math.sin(frameCount * 0.15) * 2;
      // Outer ring
      ctx.strokeStyle = '#88eeff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, pulse, 0, Math.PI * 2);
      ctx.stroke();
      // Inner ring
      ctx.strokeStyle = '#ccf5ff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, pulse * 0.55, 0, Math.PI * 2);
      ctx.stroke();
      // Orbiting satellite
      const oa = frameCount * 0.12;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(Math.cos(oa) * pulse, Math.sin(oa) * pulse, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#aaffff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GUARD', it.x, it.y - 18);
    } else if (it.type === 'heal') {
      // Heal item: pink heart with white cross, pulsing
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#ff66aa';
      ctx.save();
      ctx.translate(it.x, it.y);
      const pulse = 1 + Math.sin(frameCount * 0.18) * 0.08;
      ctx.scale(pulse, pulse);
      // Heart shape
      ctx.fillStyle = '#ff5588';
      ctx.beginPath();
      ctx.moveTo(0, 4);
      ctx.bezierCurveTo(-12, -6, -12, -14, 0, -8);
      ctx.bezierCurveTo(12, -14, 12, -6, 0, 4);
      ctx.lineTo(0, 9);
      ctx.closePath();
      ctx.fill();
      // White medical cross on top
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-2, -8, 4, 10);
      ctx.fillRect(-5, -5, 10, 4);
      ctx.restore();
      ctx.fillStyle = '#ffaacc';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('HEAL', it.x, it.y - 18);
    } else {
      // Upgrade item: spinning yellow star
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#ffff44';
      ctx.save();
      ctx.translate(it.x, it.y);
      ctx.rotate(frameCount * 0.05);
      ctx.fillStyle = '#ffdd00';
      ctx.beginPath();
      for (let j = 0; j < 5; j++) {
        const a = (j/5)*Math.PI*2 - Math.PI/2;
        const oa = a + Math.PI/5;
        if (j===0) ctx.moveTo(Math.cos(a)*12, Math.sin(a)*12);
        else ctx.lineTo(Math.cos(a)*12, Math.sin(a)*12);
        ctx.lineTo(Math.cos(oa)*5, Math.sin(oa)*5);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#ffffff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('POWER', it.x, it.y - 15);
    }

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {

  // Background for HUD
  ctx.fillStyle = 'rgba(0,0,10,0.6)';

  }

  // PC key reference footer (bottom-right)

    if (gpInput.connected) {

function showStageTitle(text) {
