// ==================== MAIN LOOP ====================
// Cap at 60 fps so high-refresh-rate monitors (120/144/240Hz) don't run
// the game faster than mobile. Game logic is per-frame, so without this
// cap PC players see everything move at 2x+ speed.
const TARGET_FPS = 60;
const FRAME_INTERVAL = 1000 / TARGET_FPS;
let lastFrameTime = 0;

function gameLoop(currentTime) {
  requestAnimationFrame(gameLoop);
  // Skip frames that arrive too soon (with 1ms tolerance for jitter)
  if (currentTime !== undefined && currentTime - lastFrameTime < FRAME_INTERVAL - 1) {
    return;
  }
  lastFrameTime = currentTime || 0;

  pollGamepad();
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  
  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  bg.addColorStop(0, '#000010');
  bg.addColorStop(0.5, '#000520');
  bg.addColorStop(1, '#010010');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  
  drawStars();
  if (gameState === 'playing' || gameState === 'stageClear') {
    drawTerrain(stage - 1);
  }

  if ((gameState === 'playing' || gameState === 'stageClear') && !isPaused) {
    frameCount++;

    const si = stage - 1;

    if (gameState === 'playing') {
      updatePlayer();
      spawnEnemies(si);
      updateEnemies(si);
      if (boss) updateBoss(si);
      updateBullets();
      updateBombs();
      updateItems();
      checkCollisions(si);
    }
    updateParticles();

    // Stage clear check
    if (stageClearTimer > 0) {
      stageClearTimer--;
      if (stageClearTimer <= 0 && gameState === 'stageClear') {
        if (stage >= 6) {
          gameState = 'gameClear';
          if (score > highScore) highScore = score;
          stopBGM();
          showOverlay('gameClear');
        } else {
          stage++;
          initStage();
          initPlayerStage();
          gameState = 'playing';
          startBGM(stage - 1);
          setTimeout(() => showStageTitle(STAGE_CONFIG[stage-1].name), 300);
        }
      }
    }
  }

  for (let e of enemies) drawEnemy(e);
  drawBoss();
  drawBullets();
  drawBombs();
  drawParticles();
  drawItems();
  drawPlayer();
  drawHUD();
  if (isPaused) drawPausedOverlay();
  // Note: requestAnimationFrame is scheduled at the top of gameLoop now
  // (combined with the 60fps cap), so no rAF call here.
}

function drawPausedOverlay() {
  ctx.fillStyle = 'rgba(0,0,30,0.6)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.shadowBlur = 24;
  ctx.shadowColor = '#ff8844';
  ctx.fillStyle = '#ffdd66';
  ctx.font = 'bold 56px monospace';
  ctx.fillText('PAUSED', CANVAS_W/2, CANVAS_H/2);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aaccff';
  ctx.font = '14px monospace';
  ctx.fillText('再開: 一時停止ボタン / P / Esc', CANVAS_W/2, CANVAS_H/2 + 36);
  ctx.restore();
}

function initPlayerStage() {
  stageBombs = 3;
  stageBeam = 2;
  beamActive = false;
  beamTimer = 0;
  player.beamMode = false;
  bullets = [];
  enemyBullets = [];
}

function showOverlay(type) {
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  
  if (type === 'gameOver') {
    ov.innerHTML = `
      <h1>💀 GAME OVER 💀</h1>
      <p>SCORE: ${score.toString().padStart(8,'0')}</p>
      <p>BEST: ${highScore.toString().padStart(8,'0')}</p>
      <button class="btn" onclick="restartGame()">▶ RETRY</button>
    `;
  } else if (type === 'gameClear') {
    ov.innerHTML = `
      <h1>🌟 GAME CLEAR! 🌟</h1>
      <p>宇宙怪獣の大軍を撃破！地球は守られた！</p>
      <br>
      <p>FINAL SCORE: ${score.toString().padStart(8,'0')}</p>
      <p>BEST SCORE: ${highScore.toString().padStart(8,'0')}</p>
      <button class="btn" onclick="restartGame()">▶ PLAY AGAIN</button>
    `;
  }
}

function restartGame() {
  if (score > highScore) highScore = score;
  score = 0;
  stage = 1;
  gameState = 'playing';
  initPlayer();
  initStage();
  if (isPaused) togglePause();
  document.getElementById('overlay').style.display = 'none';
  startBGM(0);
  setTimeout(() => showStageTitle(STAGE_CONFIG[0].name), 500);
}

// ==================== RESIZE ====================
function resizeCanvas() {
  const container = document.getElementById('gameContainer');
  const cw = container.clientWidth, ch = container.clientHeight;
  const scale = Math.min(cw / CANVAS_W, ch / CANVAS_H);
  canvas.style.width = (CANVAS_W * scale) + 'px';
  canvas.style.height = (CANVAS_H * scale) + 'px';
}

// ==================== BOOT ====================
// ==================== SOUND ====================
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// ==================== BGM (procedural) ====================
let bgm = {
  playing: false,
  stage: 0,
  bossMode: false,
  beat: 0,
  scheduledUpTo: 0,
  schedulerId: null,
  masterGain: null,
  muted: false,
  baseVol: 0.16,
};

// 16-note melodies (8th notes, semitone offsets from A3=220Hz)
const BGM_MELODIES = [
  [0,  7, 12, 14, 12, 10,  7,  5,  0,  5,  7, 10, 12, 10,  7,  5], // S1 uplifting
  [0,  7, 10, 12, 10,  7,  5,  7,  0,  5,  7, 10, 12, 10,  7,  5], // S2 driving
  [0,  5,  8, 10, 12, 10,  8,  5,  7,  5,  3,  5,  7,  8,  7,  5], // S3 cave mysterious
  [0,  7, 12,  7,  0,  7, 14,  7, -5,  7, 12,  7,  0,  7, 14,  7], // S4 pulse
  [0,  3,  7, 10, 12, 10,  7,  3, -2,  3,  5,  7, 10,  7,  5,  3], // S5 tense
  [0,  8, 12, 14, 12,  8,  0,  8, -2,  5,  8, 12,  8,  5, -2,  5], // S6 final/dark
];
const BGM_BASSES = [
  [0,  0,  7,  7, -5, -5,  3,  3],
  [0,  0, -5, -5,  3,  3,  7,  7],
  [0, -5,  3, -2,  0, -5,  3, -2],
  [0,  0,  0,  0, -7, -7, -7, -7],
  [0,  3,  7,  3, -2,  5,  7,  5],
  [0, -5,  8,  0, -2, -7,  5,  0],
];

function startBGM(stageIdx, boss = false) {
  if (!audioCtx) initAudio();
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Avoid restarting if already in same mode/stage (prevents pop on stage transition)
  if (bgm.playing && bgm.stage === stageIdx && bgm.bossMode === boss) return;
  stopBGM();
  bgm.playing = true;
  bgm.stage = Math.max(0, Math.min(BGM_MELODIES.length - 1, stageIdx));
  bgm.bossMode = boss;
  bgm.beat = 0;
  bgm.scheduledUpTo = audioCtx.currentTime + 0.1;
  bgm.masterGain = audioCtx.createGain();
  bgm.masterGain.gain.value = (bgm.muted || isPaused) ? 0 : bgm.baseVol;
  bgm.masterGain.connect(audioCtx.destination);
  bgm.schedulerId = setInterval(scheduleBGM, 80);
  scheduleBGM();
}

function stopBGM() {
  if (bgm.schedulerId) { clearInterval(bgm.schedulerId); bgm.schedulerId = null; }
  if (bgm.masterGain) {
    try { bgm.masterGain.disconnect(); } catch(e) {}
    bgm.masterGain = null;
  }
  bgm.playing = false;
}

function applyBGMVolume() {
  if (!bgm.masterGain || !audioCtx) return;
  const target = (bgm.muted || isPaused) ? 0 : bgm.baseVol;
  try {
    bgm.masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    bgm.masterGain.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 0.15);
  } catch (e) {
    bgm.masterGain.gain.value = target;
  }
}

function toggleBGMMute() {
  bgm.muted = !bgm.muted;
  const btn = document.getElementById('bgmBtn');
  if (btn) {
    btn.textContent = bgm.muted ? '♪×' : '♪';
    btn.classList.toggle('muted', bgm.muted);
  }
  applyBGMVolume();
}

function scheduleBGM() {
  if (!bgm.playing || !audioCtx) return;
  const lookahead = 0.4;
  const tempo = bgm.bossMode ? (130 + bgm.stage * 4) : (108 + bgm.stage * 4);
  const beatDur = 60 / tempo / 2; // 8th-note duration in seconds
  while (bgm.scheduledUpTo < audioCtx.currentTime + lookahead) {
    playBGMBeat(bgm.scheduledUpTo, bgm.beat, bgm.stage, bgm.bossMode);
    bgm.beat++;
    bgm.scheduledUpTo += beatDur;
  }
}

function playBGMBeat(t, beat, stage, boss) {
  const baseFreq = 220;
  const semi = (n) => baseFreq * Math.pow(2, n / 12);
  const octShift = boss ? -12 : 0;
  const melody = BGM_MELODIES[stage];
  const bass = BGM_BASSES[stage];

  // Melody (every 8th note)
  const mNote = melody[beat % melody.length];
  playBGMNote(t, semi(mNote + octShift), 'square', 0.18, boss ? 0.08 : 0.06);

  // Bass (every quarter)
  if (beat % 2 === 0) {
    const bNote = bass[(beat / 2) % bass.length] - 24;
    playBGMNote(t, semi(bNote + octShift), 'triangle', 0.32, 0.13);
  }

  // Boss: 5th harmony layer for menace
  if (boss && beat % 4 === 0) {
    playBGMNote(t, semi(mNote + octShift + 7), 'sawtooth', 0.4, 0.04);
  }

  // Drums
  if (beat % 4 === 0 || (boss && beat % 4 === 2)) playBGMDrum(t, 'kick');
  if (beat % 4 === 2) playBGMDrum(t, 'snare');
  playBGMDrum(t, 'hat');
}

function playBGMNote(t, freq, type, dur, vol) {
  if (!bgm.masterGain) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  o.connect(g);
  g.connect(bgm.masterGain);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t);
  o.stop(t + dur + 0.05);
}

function playBGMDrum(t, kind) {
  if (!bgm.masterGain) return;
  if (kind === 'kick') {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(120, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
    g.gain.setValueAtTime(0.32, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    o.connect(g); g.connect(bgm.masterGain);
    o.start(t); o.stop(t + 0.22);
  } else if (kind === 'snare') {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() - 0.5) * 2 * Math.exp(-i / data.length * 8);
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'highpass';
    filt.frequency.value = 1000;
    src.buffer = buf;
    src.connect(filt); filt.connect(g); g.connect(bgm.masterGain);
    g.gain.value = 0.18;
    src.start(t);
  } else if (kind === 'hat') {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.025, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() - 0.5) * 2;
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'highpass';
    filt.frequency.value = 6000;
    src.buffer = buf;
    src.connect(filt); filt.connect(g); g.connect(bgm.masterGain);
    g.gain.value = 0.05;
    src.start(t);
  }
}

function playSound(type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    
    switch(type) {
      case 'shoot': {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'square';
        o.frequency.setValueAtTime(800, now);
        o.frequency.exponentialRampToValueAtTime(400, now+0.08);
        g.gain.setValueAtTime(0.08, now);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.08);
        o.start(now); o.stop(now+0.08);
        break;
      }
      case 'enemy_hit': {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(300, now);
        o.frequency.exponentialRampToValueAtTime(100, now+0.1);
        g.gain.setValueAtTime(0.1, now);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.1);
        o.start(now); o.stop(now+0.1);
        break;
      }
      case 'player_hit': {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(200, now);
        o.frequency.exponentialRampToValueAtTime(50, now+0.4);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.4);
        o.start(now); o.stop(now+0.4);
        break;
      }
      case 'bomb_launch': {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(150, now);
        o.frequency.linearRampToValueAtTime(400, now+0.15);
        g.gain.setValueAtTime(0.2, now);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.15);
        o.start(now); o.stop(now+0.15);
        break;
      }
      case 'bomb_explode': {
        // Noise burst for explosion
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
        const src = audioCtx.createBufferSource();
        const g = audioCtx.createGain();
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'lowpass'; filt.frequency.value = 600;
        src.buffer = buf;
        src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.6, now);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.5);
        src.start(now); src.stop(now+0.5);
        break;
      }
      case 'beam_start': {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(100, now);
        o.frequency.exponentialRampToValueAtTime(1200, now+0.3);
        g.gain.setValueAtTime(0.0, now);
        g.gain.linearRampToValueAtTime(0.2, now+0.1);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.4);
        o.start(now); o.stop(now+0.4);
        break;
      }
      case 'upgrade': {
        const freqs = [523, 659, 784, 1046];
        freqs.forEach((freq, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = 'sine';
          o.frequency.value = freq;
          const t = now + i * 0.08;
          g.gain.setValueAtTime(0.1, t);
          g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
          o.start(t); o.stop(t+0.15);
        });
        break;
      }
      case 'boss_appear': {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(50, now);
        o.frequency.exponentialRampToValueAtTime(200, now+0.5);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.5);
        o.start(now); o.stop(now+0.5);
        break;
      }
      case 'stage_clear': {
        const freqs = [523, 784, 1046, 1318];
        freqs.forEach((freq, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = 'sine';
          o.frequency.value = freq;
          const t = now + i * 0.1;
          g.gain.setValueAtTime(0.15, t);
          g.gain.exponentialRampToValueAtTime(0.001, t+0.2);
          o.start(t); o.stop(t+0.2);
        });
        break;
      }
    }
  } catch(e) {}
}

window.addEventListener('load', () => {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  
  // White-background remover: flood fill from edges, only edge-connected
  // near-white pixels become transparent. Interior white highlights survive.
  function makeTransparent(img) {
    const w = img.naturalWidth, h = img.naturalHeight;
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const cx = c.getContext('2d');
    cx.drawImage(img, 0, 0);
    const data = cx.getImageData(0, 0, w, h);
    const px = data.data;
    const visited = new Uint8Array(w * h);
    const isWhite = i4 => px[i4] > 230 && px[i4+1] > 230 && px[i4+2] > 230 && px[i4+3] > 0;
    const stack = [];
    const push = (x, y) => {
      if (x < 0 || y < 0 || x >= w || y >= h) return;
      const idx = y * w + x;
      if (visited[idx]) return;
      if (!isWhite(idx * 4)) return;
      visited[idx] = 1;
      stack.push(x, y);
    };
    for (let x = 0; x < w; x++) { push(x, 0); push(x, h - 1); }
    for (let y = 0; y < h; y++) { push(0, y); push(w - 1, y); }
    while (stack.length) {
      const y = stack.pop(), x = stack.pop();
      px[(y * w + x) * 4 + 3] = 0;
      push(x + 1, y); push(x - 1, y); push(x, y + 1); push(x, y - 1);
    }
    cx.putImageData(data, 0, 0);
    c.complete = true;
    c.naturalWidth = w;
    c.naturalHeight = h;
    return c;
  }

  // Load images (with white-background transparency via edge flood fill)
  for (let [key, src] of Object.entries(IMG_DATA)) {
    const img = new Image();
    images[key] = img;
    img.onload = () => {
      try {
        images[key] = makeTransparent(img);
      } catch (e) {
        console.warn('transparency failed for', key, e);
      }
    };
    img.src = src;
  }
  
  initStars();
  setupMobile();
  
  document.getElementById('startBtn').addEventListener('click', () => {
    initAudio();
    document.getElementById('overlay').style.display = 'none';
    initPlayer();
    initStage();
    score = 0;
    stage = 1;
    gameState = 'playing';
    startBGM(0);
    setTimeout(() => showStageTitle(STAGE_CONFIG[0].name), 500);
  });
  
  // Game Over overlay check
  setInterval(() => {
    if (gameState === 'gameOver') {
      if (score > highScore) highScore = score;
      gameState = 'ended';
      showOverlay('gameOver');
    }
  }, 200);
  
  gameLoop();
});
</script>
